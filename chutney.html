<!DOCTYPE html>
<html lang="en" data-theme="light">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>darren.ai</title>
  <link rel="icon" type="image/png" sizes="64x64" href="favicon-64.png">
  <link rel="icon" type="image/png" sizes="32x32" href="favicon-32.png">

  <!-- Premium Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800;900&family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=Syne:wght@800&display=swap"
    rel="stylesheet">

  <style>
    /* RESET & CORE SYSTEM */
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      transition: background-color 0.4s cubic-bezier(0.16, 1, 0.3, 1),
        border-color 0.4s cubic-bezier(0.16, 1, 0.3, 1),
        box-shadow 0.4s cubic-bezier(0.16, 1, 0.3, 1);
    }

    /* THEME VARIABLES (CREAM & COCOA) */
    :root[data-theme="light"] {
      --bg: #FBF9F6;
      --bg-grid: rgba(138, 120, 102, 0.035);
      --text: #1C1917;
      --text-muted: #6B6259;
      --border: rgba(220, 210, 198, 0.6);
      --border-glow-default: rgba(220, 210, 198, 0.3);
      --card-bg: linear-gradient(135deg, rgba(255, 255, 255, 0.9) 0%, rgba(252, 250, 247, 0.9) 100%);
      --card-shadow: 0 10px 30px -10px rgba(138, 120, 102, 0.08), 0 1px 3px rgba(0, 0, 0, 0.02);
      --card-shadow-hover: 0 20px 45px -12px rgba(138, 120, 102, 0.16), 0 4px 12px rgba(138, 120, 102, 0.04);
      --header-bg: rgba(251, 249, 246, 0.8);
      --dropdown-bg: rgba(251, 249, 246, 0.75);
      --footer-hr: rgba(220, 210, 198, 0.5);

      /* Accent Colors - Light Theme */
      --color-red: hsl(14, 95%, 48%);
      --color-red-rgb: 232, 66, 10;
      --color-yellow: hsl(38, 92%, 42%);
      --color-yellow-rgb: 212, 146, 10;
      --color-green: hsl(150, 68%, 32%);
      --color-green-rgb: 30, 122, 69;
      --color-purple: hsl(266, 68%, 48%);
      --color-purple-rgb: 123, 63, 196;
      --color-blue: hsl(215, 85%, 46%);
      --color-blue-rgb: 26, 95, 168;
      --color-teal: hsl(170, 75%, 26%);
      --color-teal-rgb: 15, 107, 90;

      --bg-glow-1: rgba(232, 66, 10, 0.04);
      --bg-glow-2: rgba(123, 63, 196, 0.04);
    }

    :root[data-theme="dark"] {
      --bg: #0D0B0A;
      --bg-grid: rgba(255, 255, 255, 0.015);
      --text: #F9F8F6;
      --text-muted: #9E938A;
      --border: rgba(255, 255, 255, 0.06);
      --border-glow-default: rgba(255, 255, 255, 0.03);
      --card-bg: linear-gradient(135deg, rgba(23, 20, 19, 0.7) 0%, rgba(15, 13, 12, 0.85) 100%);
      --card-shadow: 0 10px 30px -10px rgba(0, 0, 0, 0.4), inset 0 1px 0 rgba(255, 255, 255, 0.03);
      --card-shadow-hover: 0 25px 50px -15px rgba(0, 0, 0, 0.6), inset 0 1px 0 rgba(255, 255, 255, 0.06);
      --header-bg: rgba(13, 11, 10, 0.8);
      --dropdown-bg: rgba(13, 11, 10, 0.75);
      --footer-hr: rgba(255, 255, 255, 0.06);

      /* Accent Colors - Dark Theme */
      --color-red: hsl(14, 95%, 56%);
      --color-red-rgb: 232, 66, 10;
      --color-yellow: hsl(38, 92%, 52%);
      --color-yellow-rgb: 212, 146, 10;
      --color-green: hsl(152, 70%, 45%);
      --color-green-rgb: 30, 122, 69;
      --color-purple: hsl(266, 80%, 66%);
      --color-purple-rgb: 123, 63, 196;
      --color-blue: hsl(215, 90%, 60%);
      --color-blue-rgb: 26, 95, 168;
      --color-teal: hsl(170, 75%, 44%);
      --color-teal-rgb: 15, 107, 90;

      --bg-glow-1: rgba(232, 66, 10, 0.07);
      --bg-glow-2: rgba(123, 63, 196, 0.07);
    }

    body {
      background: var(--bg);
      font-family: 'Plus Jakarta Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      color: var(--text);
      min-height: 100vh;
      overflow-x: hidden;
      position: relative;
    }

    /* Prevent text selection and drag on interactive UI elements to fix cursor flash */
    a, button, .card, .btn, .row-btn, .chip, .cc, .theme-toggle-btn, .dd-back-btn, .opt, .ti {
      user-select: none;
      -webkit-user-select: none;
      -webkit-user-drag: none;
    }

    /* BACKGROUND DESIGN ELEMENTS */
    .bg-grid-overlay {
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(var(--bg-grid) 1px, transparent 1px),
        linear-gradient(90deg, var(--bg-grid) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none;
      z-index: 0;
    }

    .bg-glow {
      position: fixed;
      width: 600px;
      height: 600px;
      border-radius: 50%;
      filter: blur(140px);
      pointer-events: none;
      z-index: 0;
      opacity: 0.8;
      will-change: transform;
    }

    .bg-glow-1 {
      top: -10%;
      left: -5%;
      background: var(--bg-glow-1);
      animation: floatGlow 18s infinite alternate ease-in-out;
    }

    .bg-glow-2 {
      bottom: -10%;
      right: -5%;
      background: var(--bg-glow-2);
      animation: floatGlow 22s infinite alternate-reverse ease-in-out;
    }

    @keyframes floatGlow {
      0% {
        transform: translate(0, 0) scale(1);
      }

      100% {
        transform: translate(50px, 30px) scale(1.1);
      }
    }

    /* ── Darren Dias brand nav (ported from the main portfolio) ── */
    .dd-nav {
      position: sticky;
      top: 0;
      width: 100%;
      background: var(--header-bg);
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      border-bottom: 1px solid var(--border);
      z-index: 100;
      transition: background .3s, border-color .3s;
    }

    .dd-nav-inner {
      max-width: 600px;
      margin: 0 auto;
      padding: 14px 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }

    .dd-nav-logo {
      display: inline-flex;
      align-items: center;
      gap: 9px;
      text-decoration: none;
      flex-shrink: 0;
    }

    .dd-nav-logo-mark {
      font-family: 'Syne', sans-serif;
      font-weight: 800;
      font-size: 18px;
      color: var(--color-red);
      line-height: 1;
      display: inline-flex;
      flex-direction: column;
      align-items: center;
      gap: 1px;
      transition: transform .25s cubic-bezier(.34, 1.56, .64, 1), color .3s;
    }

    .dd-nav-logo:hover .dd-nav-logo-mark {
      transform: translateY(-1px);
    }

    .dd-nlm-row {
      display: inline-flex;
      align-items: center;
    }

    .dd-nlm-flip {
      display: inline-block;
      transform: scaleX(-1);
      margin-right: -0.08em;
    }

    .dd-nlm-smirk-path {
      stroke: var(--text-muted);
      transition: stroke .3s;
    }

    .dd-nav-logo:hover .dd-nlm-smirk-path {
      stroke: var(--color-red);
    }

    .dd-nav-wordmark {
      font-family: 'Syne', sans-serif;
      font-weight: 800;
      font-size: 15px;
      color: var(--text);
      letter-spacing: -0.01em;
      white-space: nowrap;
      transition: color .3s;
    }

    .dd-nav-right {
      display: flex;
      align-items: center;
      gap: 18px;
    }

    /* premium back button — tinted with this tool's own accent colour on
       hover, so it ties into the same colour identity as the DD logo mark */
    .dd-back-btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      height: 32px;
      padding: 0 14px 0 11px;
      border-radius: 100px;
      border: 1px solid var(--border);
      background: var(--card-bg);
      color: var(--text-muted);
      font-family: 'Plus Jakarta Sans', sans-serif;
      font-size: 13px;
      font-weight: 600;
      text-decoration: none;
      white-space: nowrap;
      box-shadow: var(--card-shadow);
      transition: border-color .25s, background .25s, color .25s, box-shadow .25s, transform .15s;
    }

    .dd-back-btn svg {
      width: 15px;
      height: 15px;
      flex-shrink: 0;
      transition: transform .25s cubic-bezier(.34, 1.56, .64, 1);
    }

    .dd-back-btn:hover {
      border-color: var(--color-red);
      color: var(--color-red);
      background: rgba(var(--color-red-rgb), 0.1);
      box-shadow: 0 4px 16px rgba(var(--color-red-rgb), 0.22);
    }

    .dd-back-btn:hover svg {
      transform: translateX(-2px);
    }

    .dd-back-btn:active {
      transform: scale(0.94);
    }

    @media (max-width: 360px) {
      .dd-nav-wordmark {
        font-size: 13px;
      }

      .dd-nav-right {
        gap: 12px;
      }

      .dd-back-btn span {
        display: none;
      }

      .dd-back-btn {
        padding: 0 9px;
      }
    }

    /* ── premium custom cursor — real mouse/trackpad only ─────────────
       Touch devices are completely untouched: cursor:none only applies
       inside this same media feature, so nothing changes on mobile.    */
    @media (hover: hover) and (pointer: fine) {

      html.dd-cursor-on,
      html.dd-cursor-on * {
        cursor: none !important;
      }
    }

    .dd-cursor-dot,
    .dd-cursor-ring {
      position: fixed;
      top: 0;
      left: 0;
      pointer-events: none;
      z-index: 9999999;
      border-radius: 50%;
      opacity: 0;
      will-change: transform;
    }

    .dd-cursor-dot.is-visible,
    .dd-cursor-ring.is-visible {
      opacity: 1;
    }

    .dd-cursor-dot.is-leaving,
    .dd-cursor-ring.is-leaving {
      opacity: 0;
    }

    .dd-cursor-dot {
      width: 6px;
      height: 6px;
      background: var(--color-red);
      transition: opacity .2s;
    }

    .dd-cursor-ring {
      width: 34px;
      height: 34px;
      border: 1.5px solid rgba(var(--color-red-rgb), 0.55);
      box-shadow: 0 0 16px rgba(var(--color-red-rgb), 0.22);
      transition: width .3s cubic-bezier(.34, 1.56, .64, 1), height .3s cubic-bezier(.34, 1.56, .64, 1),
        background .3s, border-color .3s, box-shadow .3s, opacity .2s;
    }

    .dd-cursor-ring.is-active {
      width: 52px;
      height: 52px;
      background: rgba(var(--color-red-rgb), 0.1);
      border-color: rgba(var(--color-red-rgb), 0.85);
      box-shadow: 0 0 26px rgba(var(--color-red-rgb), 0.35);
    }

    .dd-cursor-ring.is-pressed {
      width: 26px;
      height: 26px;
    }



    /* Theme Switcher Button */
    .theme-toggle-btn {
      background: var(--card-bg);
      border: 1px solid var(--border);
      padding: 6px;
      border-radius: 30px;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 6px;
      position: relative;
      width: 58px;
      height: 32px;
      box-shadow: var(--card-shadow);
    }

    .theme-toggle-thumb {
      width: 20px;
      height: 20px;
      border-radius: 50%;
      background: var(--text);
      position: absolute;
      left: 5px;
      transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1), background-color 0.3s;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--bg);
      font-size: 10px;
    }

    [data-theme="dark"] .theme-toggle-thumb {
      transform: translateX(26px);
    }

    .theme-toggle-btn svg {
      width: 13px;
      height: 13px;
      fill: none;
      stroke: currentColor;
      stroke-width: 2.5;
      stroke-linecap: round;
      stroke-linejoin: round;
      opacity: 0.5;
      transition: opacity 0.2s;
    }

    .theme-toggle-btn svg.active {
      opacity: 1;
    }

    .theme-icons {
      display: flex;
      justify-content: space-between;
      width: 100%;
      padding: 0 4px;
      color: var(--text-muted);
      pointer-events: none;
    }

    /* APP CONTAINER & CARD STRUCTURE */
    .app {
      min-height: calc(100vh - 65px);
      position: relative;
      z-index: 10;
    }

    .inner {
      max-width: 570px;
      margin: 0 auto;
      padding: 44px 20px 80px;
    }

    /* TYPOGRAPHY */
    .h1 {
      font-family: 'Outfit', sans-serif;
      font-size: 28px;
      font-weight: 800;
      color: var(--text);
      margin-bottom: 10px;
      line-height: 1.2;
      letter-spacing: -0.03em;
      animation: fadeInUp 0.4s ease both;
    }

    .sub {
      font-size: 15.5px;
      color: var(--text-muted);
      margin-bottom: 30px;
      line-height: 1.6;
      animation: fadeInUp 0.4s ease 0.05s both;
    }

    /* FORM ELEMENTS & INPUTS */
    .field {
      margin-bottom: 24px;
      animation: fadeInUp 0.4s ease 0.1s both;
    }

    .lbl {
      font-family: 'Outfit', sans-serif;
      font-size: 11px;
      font-weight: 800;
      color: var(--text-muted);
      display: block;
      margin-bottom: 8px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
    }

    .inp {
      width: 100%;
      padding: 14px 18px;
      border: 1.5px solid var(--border);
      border-radius: 16px;
      font-size: 15px;
      color: var(--text);
      background: var(--card-bg);
      outline: none;
      font-family: inherit;
      box-shadow: var(--card-shadow);
      transition: all 0.3s;
    }

    .inp:focus {
      border-color: var(--color-red);
      box-shadow: 0 0 0 3px rgba(var(--color-red-rgb), 0.12);
    }

    /* PREMIUM CUSTOM DROPDOWN */
    .dd-dropdown {
      position: relative;
      width: 100%;
      outline: none;
      animation: fadeInUp 0.4s ease 0.1s both;
    }
    /* PREMIUM JAVASCRIPT-DRIVEN DROPDOWN (AVOIDS SAFARI CLIPPING BUGS) */
    .premium-dd-overlay {
      position: fixed;
      inset: 0;
      z-index: 99998;
    }
    .premium-dd-menu {
      position: absolute;
      z-index: 99999;
      background: var(--dropdown-bg);
      border: 1px solid var(--border);
      border-radius: 16px;
      box-shadow: 0 20px 40px rgba(0,0,0,0.15), 0 0 0 1px rgba(255,255,255,0.05) inset;
      backdrop-filter: blur(24px) saturate(150%);
      -webkit-backdrop-filter: blur(24px) saturate(150%);
      max-height: 280px;
      overflow-y: auto;
      padding: 8px;
      opacity: 0;
      transform: translateY(-10px);
      transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
    }
    .premium-dd-menu.open {
      opacity: 1;
      transform: translateY(0);
    }
    .premium-dd-item {
      padding: 12px 16px;
      border-radius: 10px;
      cursor: pointer;
      font-size: 14.5px;
      color: var(--text);
      transition: background 0.2s, color 0.2s;
    }
    .premium-dd-item:hover {
      background: rgba(var(--accent-rgb, 232, 66, 10), 0.08);
      color: rgb(var(--accent-rgb, 232, 66, 10));
    }
    .premium-dd-item.selected {
      background: rgba(var(--accent-rgb, 232, 66, 10), 0.12);
      color: rgb(var(--accent-rgb, 232, 66, 10));
      font-weight: 700;
    }
    .premium-dd-trigger {
      display: flex;
      justify-content: space-between;
      align-items: center;
      cursor: pointer;
      width: 100%;
      padding: 14px 18px;
      border: 1.5px solid var(--border);
      border-radius: 16px;
      font-size: 15px;
      color: var(--text);
      background: var(--card-bg);
      box-shadow: var(--card-shadow);
      transition: border-color 0.3s, box-shadow 0.3s;
    }
    .premium-dd-trigger span.placeholder {
      color: var(--text-muted);
    }
    .premium-dd-trigger.active {
      border-color: rgb(var(--accent-rgb, 232, 66, 10));
      box-shadow: 0 0 0 3px rgba(var(--accent-rgb, 232, 66, 10), 0.12);
    }
    .premium-dd-trigger svg {
      transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
      stroke: var(--text-muted);
    }
    .premium-dd-trigger.active svg {
      transform: rotate(180deg);
      stroke: rgb(var(--accent-rgb, 232, 66, 10));
    }
      border-radius: 10px;
      cursor: pointer;
      font-size: 14.5px;
      color: var(--text);
      transition: background 0.2s, color 0.2s;
    }
    .dd-dropdown-item:hover {
      background: rgba(var(--color-red-rgb), 0.08);
      color: var(--color-red);
    }
    .dd-dropdown-item.selected {
      background: rgba(var(--color-red-rgb), 0.12);
      color: var(--color-red);
      font-weight: 700;
    }

    /* TACTILE ROW SELECTION BUTTONS */
    .row-btn {
      width: 100%;
      padding: 16px 20px;
      border: 1.5px solid var(--border);
      border-radius: 16px;
      background: var(--card-bg);
      color: var(--text);
      font-size: 15px;
      cursor: pointer;
      text-align: left;
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-family: inherit;
      font-weight: 500;
      box-shadow: var(--card-shadow);
      margin-bottom: 10px;
      animation: fadeInUp 0.4s ease both;
    }

    .row-btn:hover {
      border-color: var(--color-red);
      transform: translateY(-2px);
      box-shadow: var(--card-shadow-hover);
    }

    .row-btn.on {
      border-color: var(--color-red);
      background: rgba(var(--color-red-rgb), 0.04);
      color: var(--color-red);
      font-weight: 700;
      box-shadow: 0 8px 24px -8px rgba(var(--color-red-rgb), 0.12);
    }

    .row-btn.on span {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 20px;
      height: 20px;
      border-radius: 50%;
      background: var(--color-red);
      color: #fff;
      font-size: 11px;
      line-height: 1;
    }

    /* BUTTONS */
    .btn {
      width: 100%;
      padding: 16px;
      background: var(--color-red);
      color: #fff;
      border: none;
      border-radius: 100px;
      font-size: 15.5px;
      font-weight: 700;
      cursor: pointer;
      margin-top: 24px;
      font-family: inherit;
      letter-spacing: -0.01em;
      box-shadow: 0 4px 14px rgba(var(--color-red-rgb), 0.25);
      display: flex;
      align-items: center;
      justify-content: center;
      transition: transform 0.25s, box-shadow 0.25s, opacity 0.2s, filter 0.2s;
    }

    .btn:hover:not(:disabled) {
      transform: translateY(-2px);
      box-shadow: 0 8px 20px rgba(var(--color-red-rgb), 0.35);
      filter: brightness(1.04);
    }

    .btn:active:not(:disabled) {
      transform: translateY(0);
    }

    .btn:disabled {
      opacity: 0.35;
      cursor: default;
      box-shadow: none;
    }

    .btn.ghost {
      background: none;
      border: 1.5px solid var(--border);
      color: var(--text);
      box-shadow: none;
      margin-top: 12px;
    }

    .btn.ghost:hover {
      background: rgba(var(--color-red-rgb), 0.03);
      border-color: var(--color-red);
      color: var(--color-red);
      box-shadow: none;
    }

    /* CHIP LAYOUT SYSTEM */
    .section-label {
      font-family: 'Outfit', sans-serif;
      font-size: 11px;
      font-weight: 800;
      color: var(--text-muted);
      letter-spacing: 0.12em;
      text-transform: uppercase;
      margin: 28px 0 10px;
      animation: fadeInUp 0.4s ease both;
    }

    .chip-wrap {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      animation: fadeInUp 0.4s ease both;
    }

    .chip {
      padding: 9px 18px;
      border-radius: 100px;
      border: 1.5px solid var(--border);
      background: var(--card-bg);
      color: var(--text);
      font-size: 13.5px;
      cursor: pointer;
      white-space: nowrap;
      font-family: inherit;
      font-weight: 500;
      box-shadow: var(--card-shadow);
      transition: all 0.2s;
    }

    .chip:hover {
      border-color: var(--text-muted);
      transform: translateY(-1.5px);
    }

    /* Dynamic Active Chip States */
    .chip.on {
      border-color: var(--color-red);
      background: rgba(var(--color-red-rgb), 0.05);
      color: var(--color-red);
      font-weight: 700;
      box-shadow: 0 6px 16px -6px rgba(var(--color-red-rgb), 0.16);
    }

    .chip.on.grn {
      border-color: var(--color-green);
      background: rgba(var(--color-green-rgb), 0.05);
      color: var(--color-green);
      box-shadow: 0 6px 16px -6px rgba(var(--color-green-rgb), 0.16);
    }

    .chip.on.blu {
      border-color: var(--color-blue);
      background: rgba(var(--color-blue-rgb), 0.05);
      color: var(--color-blue);
      box-shadow: 0 6px 16px -6px rgba(var(--color-blue-rgb), 0.16);
    }

    .chip.on.pur {
      border-color: var(--color-purple);
      background: rgba(var(--color-purple-rgb), 0.05);
      color: var(--color-purple);
      box-shadow: 0 6px 16px -6px rgba(var(--color-purple-rgb), 0.16);
    }

    /* STEP DOTS INDICATOR */
    .dots {
      display: flex;
      gap: 8px;
      justify-content: center;
      margin-bottom: 32px;
      animation: fadeInDown 0.4s ease both;
    }

    .dot {
      height: 6px;
      border-radius: 100px;
      background: var(--border);
      transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
    }

      font-weight: 600;
      color: var(--text-muted);
      margin-top: 4px;
      text-transform: uppercase;

      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 24px;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      box-shadow: var(--card-shadow);
      margin-bottom: 20px;
      padding: 1px;

      animation: fadeInUp 0.4s ease both;

      --mouse-y: 0px;

      box-shadow: var(--card-shadow-hover);
    }

      position: absolute;
      inset: 0;
      border-radius: 24px;
      background: radial-gradient(300px circle at var(--mouse-x) var(--mouse-y), var(--card-glow-border, transparent), transparent 50%);

      transition: opacity 0.4s;
      z-index: 0;
      pointer-events: none;

      inset: 1px;
      border-radius: 23px;
      background: radial-gradient(350px circle at var(--mouse-x) var(--mouse-y), var(--card-glow-inner, transparent), transparent 50%);

      transition: opacity 0.4s;
      z-index: 1;
      pointer-events: none;

      animation: aiRotate 4s infinite linear;
    }

    .ai-scan-line {
      position: absolute;
      width: 110px;
      height: 2px;

    @keyframes aiPulse {

    function openPremiumDropdown(e, options, selectedValue, accentVar, onSelectCallback) {
      document.querySelectorAll('.premium-dd-menu, .premium-dd-overlay').forEach(el => el.remove());
      
      const trigger = e.currentTarget;
      const rect = trigger.getBoundingClientRect();
      
      const overlay = document.createElement('div');
      overlay.className = 'premium-dd-overlay';
      overlay.onclick = () => {
        document.querySelectorAll('.premium-dd-menu, .premium-dd-overlay').forEach(el => el.remove());
        trigger.classList.remove('active');
      };
      document.body.appendChild(overlay);
      
      const menu = document.createElement('div');
      menu.className = 'premium-dd-menu';
      menu.style.setProperty('--accent-rgb', accentVar);
      
      options.forEach(opt => {
        const item = document.createElement('div');
        item.className = 'premium-dd-item' + (opt.value === selectedValue ? ' selected' : '');
        item.innerHTML = opt.label;
        item.onclick = () => {
          onSelectCallback(opt.value);
          overlay.remove();
          menu.remove();
          trigger.classList.remove('active');
        };
        menu.appendChild(item);
      });
      
      document.body.appendChild(menu);
      
      const menuHeight = menu.offsetHeight;
      const spaceBelow = window.innerHeight - rect.bottom;
      const spaceAbove = rect.top;
      
      if (spaceBelow < menuHeight + 16 && spaceAbove > spaceBelow) {
        menu.style.top = (rect.top + window.scrollY - menuHeight - 8) + 'px';
        menu.style.transform = 'translateY(10px)';
      } else {
        menu.style.top = (rect.bottom + window.scrollY + 8) + 'px';
      }
      
      menu.style.left = (rect.left + window.scrollX) + 'px';
      menu.style.width = rect.width + 'px';
      
      trigger.classList.add('active');
      requestAnimationFrame(() => menu.classList.add('open'));

    // Helper: translate hardcoded group colors (R, Y, G, P, B, TL) to theme CSS property targets
    function getGroupTheme(cHex) {
      if (cHex === R) return { c: 'var(--color-red)', rgb: 'var(--color-red-rgb)', bg: 'rgba(var(--color-red-rgb), 0.08)', b: 'rgba(var(--color-red-rgb), 0.16)' };
      if (cHex === Y) return { c: 'var(--color-yellow)', rgb: 'var(--color-yellow-rgb)', bg: 'rgba(var(--color-yellow-rgb), 0.08)', b: 'rgba(var(--color-yellow-rgb), 0.16)' };
      if (cHex === G) return { c: 'var(--color-green)', rgb: 'var(--color-green-rgb)', bg: 'rgba(var(--color-green-rgb), 0.08)', b: 'rgba(var(--color-green-rgb), 0.16)' };
      if (cHex === P) return { c: 'var(--color-purple)', rgb: 'var(--color-purple-rgb)', bg: 'rgba(var(--color-purple-rgb), 0.08)', b: 'rgba(var(--color-purple-rgb), 0.16)' };
      if (cHex === B) return { c: 'var(--color-blue)', rgb: 'var(--color-blue-rgb)', bg: 'rgba(var(--color-blue-rgb), 0.08)', b: 'rgba(var(--color-blue-rgb), 0.16)' };
      if (cHex === TL) return { c: 'var(--color-teal)', rgb: 'var(--color-teal-rgb)', bg: 'rgba(var(--color-teal-rgb), 0.08)', b: 'rgba(var(--color-teal-rgb), 0.16)' };
      return { c: 'var(--text-muted)', rgb: '128,128,128', bg: 'rgba(128,128,128,0.08)', b: 'rgba(128,128,128,0.16)' };
    }

    function getMatches(ints, goals) {
      return GROUPS.map(g => {
        let sc = 0;
        ints.forEach(i => { if (g.it.includes(i)) sc += 3; });
        goals.forEach(gl => { if (g.gt.includes(gl)) sc += 2; });
        return { ...g, sc, pct: Math.min(98, 48 + sc * 5) };
      }).sort((a, b) => b.sc - a.sc).slice(0, 6);
    }

    let st = { step: 0, name: "", uni: "", homeState: "", area: "", ints: [], goals: [], loading: false };

    function logoHTML() {
      const letters = "chutney".split('');
      return `<div class="logo-row-chutney">
        ${letters.map((l, i) => `<span class="logo-letter-chutney" style="background:${LETTER_COLORS[i]}; animation-delay: ${i * 0.08}s">${l}</span>`).join('')}
      </div>`;
    }

    function dots(cur) {
      return `<div class="dots">${[0, 1, 2, 3, 4].map(i => `<div class="dot${i <= cur ? ' act' : ''}" style="width:${i === cur ? 28 : 8}px"></div>`).join('')}</div>`;
    }

    // Dynamic Card Spotlight Mouse Hover Glow Init
    function initCardGlows() {
      const cards = document.querySelectorAll('.card');
      cards.forEach(card => {
        card.addEventListener('mousemove', (e) => {
          const rect = card.getBoundingClientRect();
          const x = e.clientX - rect.left;
          const y = e.clientY - rect.top;
          card.style.setProperty('--mouse-x', `${x}px`);
          card.style.setProperty('--mouse-y', `${y}px`);
        });
      });
    }

    let lastStep = -1;
    function render() {
      const el = document.getElementById('screen');
      const s = st;

      if (s.step !== lastStep) {
        window.scrollTo(0, 0);
        lastStep = s.step;
      }

      if (st.loading) {
        el.innerHTML = `
          <div style="text-align:center; padding: 48px 20px; animation: fadeInUp 0.5s ease both;">
            <div class="ai-loader-container">
              <div class="ai-pulse-orb">

          </div>

              <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M8.5 14.5A2.5 2.5 0 0 0 11 12c0-1.38-.5-2-1-3-1.072-2.143-.224-4.054 2-6 .5 2.5 2 4.9 4 6.5 2 1.6 3 3.5 3 5.5a7 7 0 1 1-14 0c0-1.153.433-2.294 1-3a2.5 2.5 0 0 0 2.5 2.5z"></path></svg>

          <button class="btn" style="max-width:280px;display:flex;margin:0 auto" onclick="go(1)">Get started →</button>

        </div>`;
      }

      else if (s.step === 1) {
        el.innerHTML = `${dots(0)}
          <h2 class="h1">Let's set up your profile</h2>
          <p class="sub">Quick basics so we can find the right circles.</p>
          
          <div class="field">
            <label class="lbl">Your name</label>
            <input class="inp" id="nm" placeholder="What should we call you?" value="${s.name}" oninput="st.name=this.value;checkBtn('s1b',()=>st.name.trim()&&st.uni)">
          </div>
          
          <div class="field">
            <label class="lbl">Your university</label>
            <div class="premium-dd-trigger" onclick="openPremiumDropdown(event, UNIS.map(u => ({label: u, value: u})), st.uni, 'var(--color-red-rgb)', (val) => { st.uni = val; checkBtn('s1b',()=>st.name.trim()&&st.uni); render(); })">
              <span class="${!st.uni ? 'placeholder' : ''}">${st.uni || 'Select your university...'}</span>
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"></polyline></svg>
            </div>
          </div>
          
          <button class="btn" id="s1b" onclick="go(2)" ${!s.name.trim() || !s.uni ? 'disabled' : ''}>Continue →</button>`;

        // Re-validate fields inside screen when entering step 1
        const inputName = document.getElementById('nm');
        if (inputName) {
          inputName.focus();
        }
      }

      else if (s.step === 2) {
        el.innerHTML = `${dots(1)}
          <h2 class="h1">Where in London are you?</h2>
          <p class="sub">We'll suggest nearby events and meetups in your area.</p>
          <div style="display:flex;flex-direction:column;gap:8px">
            ${AREAS.map((a, idx) => `<button class="row-btn${s.area === a ? ' on' : ''}" style="animation-delay: ${idx * 0.05}s" onclick="st.area='${a}';go(3)">
              ${a}
              ${s.area === a ? '<span>✓</span>' : ''}
            </button>`).join('')}
          </div>`;
      }

      else if (s.step === 3) {
        el.innerHTML = `${dots(2)}
          <h2 class="h1">Where are you from?</h2>
          <p class="sub">Help us connect you with people from home — and help you bond with others who get the references.</p>
          

          <div class="field">
            <label class="lbl">State / Region from India</label>
            <div class="premium-dd-trigger" onclick="openPremiumDropdown(event, STATES.map(s => ({label: s, value: s})), st.homeState, 'var(--color-red-rgb)', (val) => { st.homeState = val; checkBtn('s3b',()=>st.homeState); render(); })">

              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"></polyline></svg>
            </div>
          </div>
          
          <button class="btn" id="s3b" onclick="go(4)" ${!st.homeState ? 'disabled' : ''}>Continue →</button>`;
      }

      else if (s.step === 4) {

          // Dynamic chip color styling depending on Category
          const isRedCat = sec.label.includes("Sports");
          const isBlueCat = sec.label.includes("Social");
          const isGreenCat = sec.label.includes("Creative") || sec.label.includes("Explore");
          const colorClass = isRedCat ? "" : (isBlueCat ? " blu" : (isGreenCat ? " grn" : " pur"));

          return `
              <div class="section-label" style="animation-delay: ${idx * 0.05}s">${sec.label}</div>
              <div class="chip-wrap" style="margin-bottom:8px; animation-delay: ${idx * 0.05}s">
                ${sec.items.map(i => `<button class="chip${selected.includes(i) ? ' on' + colorClass : ''}" onclick="toggleInt('${i.replace(/'/g, "\\'")}')">
                  ${i}
                </button>`).join('')}
              </div>`;
        }).join('')}
          
          <div id="icnt" style="font-size:14px; margin-top:28px; padding:12px 18px; border-radius:12px; display:inline-block; transition: all 0.3s;

          <button class="btn" id="s4b" onclick="go(5)" ${selected.length < 4 ? 'disabled' : ''}>Continue →</button>`;

                  <div class="cname">${g.name}</div>
                </div>
                <div class="card-icon-container" style="background:${themeColors.bg}; border: 1px solid ${themeColors.b}; color: ${themeColors.c};">
                  <div class="card-icon" style="display:flex;align-items:center;justify-content:center;width:100%;height:100%">${g.icon}</div>
                </div>
              </div>
              <p class="cdesc">${g.desc}</p>
              <div class="cmeta">
                <span>👥 ${g.members} members</span>
                <span>📅 ${g.event}</span>
                <button class="jbtn" style="background:${themeColors.c}; box-shadow: 0 4px 12px rgba(${themeColors.rgb}, 0.2);" onclick="this.textContent='Joined! 🎉'; this.style.background='var(--color-green)'; this.style.boxShadow='0 4px 12px rgba(30,122,69,0.2)'">Join Circle</button>
              </div>
            </div>
          </div>`;
        }).join('');

        el.innerHTML = `
          <div style="text-align:center;margin-bottom:36px; animation: fadeInUp 0.4s ease both;">
            <div style="margin-bottom:18px">${logoHTML()}</div>
            <h2 class="h1" style="font-size:24px">Hey ${s.name || 'there'}, your circles are ready 🎉</h2>
            <p style="font-size:14px;color:var(--text-muted);font-weight:600;margin-top:8px">${s.uni} · ${s.area}${s.homeState ? ` · ${stateTag}` : ''}</p>
          </div>
          
          <div style="animation: fadeInUp 0.5s ease both;">
            ${cardsHTML}
          </div>
          
          <div class="cta-box">
            <div style="font-family:'Outfit', sans-serif; font-size:18px; font-weight:800; color:var(--text); margin-bottom:8px">See all 40+ circles on Chutney</div>
            <div style="font-size:14px; color:var(--text-muted); line-height:1.6; margin-bottom:20px; max-width: 420px; margin-left: auto; margin-right: auto;">Browse every community, RSVP to events, DM members, post BuddyUp requests.</div>
            <button class="btn" style="max-width:240px; display:flex; margin:0 auto" onclick="alert('Coming soon!')">Create free account</button>
          </div>
          
          <button class="back-link" onclick="reset()">Start over</button>`;

        // Re-initialize dynamic spotlights on freshly rendered match cards
        initCardGlows();
      }
    }

    function go(n) { st.step = n; render(); }
    function checkBtn(id, fn) { const b = document.getElementById(id); if (b) b.disabled = !fn(); }
    function toggleInt(i) {
      st.ints = st.ints.includes(i) ? st.ints.filter(x => x !== i) : [...st.ints, i];
      render();
    }
    function toggleGoal(g) {
      st.goals = st.goals.includes(g) ? st.goals.filter(x => x !== g) : [...st.goals, g];
      render();
    }
    function triggerAILoader() {
      st.loading = true;
      render();

      const loadingMessages = [
        "Analyzing profile inputs...",
        "Querying London circles database...",
        "Evaluating " + st.ints.length + " shared interests...",
        "Filtering campus matches at " + st.uni + "...",
        "Matching social goals in " + st.area + "...",
        "Synthesizing spice compatibility index..."
      ];

      let msgIndex = 0;
      const interval = setInterval(() => {
        const lbl = document.getElementById('ai-loading-lbl');
        if (lbl && msgIndex < loadingMessages.length) {
          lbl.textContent = loadingMessages[msgIndex++];
        }
      }, 500);

      setTimeout(() => {
        clearInterval(interval);
        st.loading = false;
        st.step = 6;
        render();
      }, 3000);
    }

    function doMatch() { triggerAILoader(); }
    function reset() { st = { step: 0, name: "", uni: "", homeState: "", area: "", ints: [], goals: [], loading: false }; render(); }

    // INITIAL LOAD
    render();

    // DYNAMIC LIGHT / DARK THEME SYSTEM
    const themeToggleBtn = document.getElementById('themeToggleBtn');
    const iconSun = document.getElementById('icon-sun');
    const iconMoon = document.getElementById('icon-moon');
    const htmlElement = document.documentElement;

    // Load theme from localStorage or system preference
    const savedTheme = localStorage.getItem('theme');
    const systemPrefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
    const initialTheme = savedTheme || (systemPrefersDark ? 'dark' : 'light');

    setTheme(initialTheme);

    themeToggleBtn.addEventListener('click', () => {
      const currentTheme = htmlElement.getAttribute('data-theme');
      const newTheme = currentTheme === 'dark' ? 'light' : 'dark';
      setTheme(newTheme);
    });

    function setTheme(theme) {
      htmlElement.setAttribute('data-theme', theme);
      localStorage.setItem('theme', theme);

      if (theme === 'dark') {
        iconMoon.classList.add('active');
        iconSun.classList.remove('active');
      } else {
        iconSun.classList.add('active');
        iconMoon.classList.remove('active');
      }
    }

    /* ── premium custom cursor ──────────────────────────────────────
       Dot tracks the pointer exactly; the ring trails behind with a
       little easing for a smooth, fluid feel. Scales up over anything
       clickable, scales down on press, and never touches touch devices
       at all — gated behind the same media feature the CSS uses.      */
    (function initPremiumCursor() {
      if (!window.matchMedia('(hover: hover) and (pointer: fine)').matches) return;

      document.documentElement.classList.add('dd-cursor-on');

      var dot = document.createElement('div');
      dot.className = 'dd-cursor-dot';
      var ring = document.createElement('div');
      ring.className = 'dd-cursor-ring';
      document.body.appendChild(dot);
      document.body.appendChild(ring);

      var mx = 0, my = 0, rx = 0, ry = 0, hasMoved = false;

      function placeDot() {
        dot.style.transform = 'translate(' + mx + 'px, ' + my + 'px) translate(-50%, -50%)';
      }

      window.addEventListener('mousemove', function (e) {
        mx = e.clientX;
        my = e.clientY;
        if (!hasMoved) {
          hasMoved = true;
          rx = mx;
          ry = my;
          dot.classList.add('is-visible');
          ring.classList.add('is-visible');
        }
        placeDot();
      });

      (function tick() {
        rx += (mx - rx) * 0.18;
        ry += (my - ry) * 0.18;
        ring.style.transform = 'translate(' + rx + 'px, ' + ry + 'px) translate(-50%, -50%)';
        requestAnimationFrame(tick);
      })();

      var interactiveSel = 'a, button, input, select, textarea, label, summary, [role="button"], [onclick]';

      document.addEventListener('mouseover', function (e) {
        if (e.target.closest(interactiveSel)) ring.classList.add('is-active');
      });
      document.addEventListener('mouseout', function (e) {
        if (e.target.closest(interactiveSel)) ring.classList.remove('is-active');
      });
      document.addEventListener('mousedown', function () { ring.classList.add('is-pressed'); });
      document.addEventListener('mouseup', function () { ring.classList.remove('is-pressed'); });

      document.addEventListener('mouseleave', function () {
        dot.classList.add('is-leaving');
        ring.classList.add('is-leaving');
      });
      document.addEventListener('mouseenter', function () {
        dot.classList.remove('is-leaving');
        ring.classList.remove('is-leaving');
      });
    })();
  </script>
</body>
