<!DOCTYPE html>
<html lang="en" data-theme="light">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>darren.ai</title>
  <link rel="icon" type="image/png" sizes="64x64" href="favicon-64.png">
  <link rel="icon" type="image/png" sizes="32x32" href="favicon-32.png">

  <!-- Premium Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800;900&family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=Syne:wght@800&display=swap"
    rel="stylesheet">

  <style>
    /* RESET & CORE SYSTEM */
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      transition: background-color 0.4s cubic-bezier(0.16, 1, 0.3, 1),
        border-color 0.4s cubic-bezier(0.16, 1, 0.3, 1),
        box-shadow 0.4s cubic-bezier(0.16, 1, 0.3, 1);
    }

    /* THEME VARIABLES (CREAM & COCOA) */
    :root[data-theme="light"] {
      --bg: #FBF9F6;
      --bg-grid: rgba(138, 120, 102, 0.035);
      --text: #1C1917;
      --text-muted: #6B6259;
      --border: rgba(220, 210, 198, 0.6);
      --border-glow-default: rgba(220, 210, 198, 0.3);
      --card-bg: linear-gradient(135deg, rgba(255, 255, 255, 0.9) 0%, rgba(252, 250, 247, 0.9) 100%);
      --card-shadow: 0 10px 30px -10px rgba(138, 120, 102, 0.08), 0 1px 3px rgba(0, 0, 0, 0.02);
      --card-shadow-hover: 0 20px 45px -12px rgba(138, 120, 102, 0.16), 0 4px 12px rgba(138, 120, 102, 0.04);
      --header-bg: rgba(251, 249, 246, 0.8);
      --dropdown-bg: rgba(251, 249, 246, 0.75);
      --footer-hr: rgba(220, 210, 198, 0.5);

      /* Accent Colors - Light Theme */
      --color-red: hsl(14, 95%, 48%);
      --color-red-rgb: 232, 66, 10;
      --color-yellow: hsl(38, 92%, 42%);
      --color-yellow-rgb: 212, 146, 10;
      --color-green: hsl(150, 68%, 32%);
      --color-green-rgb: 30, 122, 69;
      --color-purple: hsl(266, 68%, 48%);
      --color-purple-rgb: 123, 63, 196;
      --color-blue: hsl(215, 85%, 46%);
      --color-blue-rgb: 26, 95, 168;
      --color-teal: hsl(170, 75%, 26%);
      --color-teal-rgb: 15, 107, 90;

      --bg-glow-1: rgba(232, 66, 10, 0.04);
      --bg-glow-2: rgba(123, 63, 196, 0.04);
    }

    :root[data-theme="dark"] {
      --bg: #0D0B0A;
      --bg-grid: rgba(255, 255, 255, 0.015);
      --text: #F9F8F6;
      --text-muted: #9E938A;
      --border: rgba(255, 255, 255, 0.06);
      --border-glow-default: rgba(255, 255, 255, 0.03);
      --card-bg: linear-gradient(135deg, rgba(23, 20, 19, 0.7) 0%, rgba(15, 13, 12, 0.85) 100%);
      --card-shadow: 0 10px 30px -10px rgba(0, 0, 0, 0.4), inset 0 1px 0 rgba(255, 255, 255, 0.03);
      --card-shadow-hover: 0 25px 50px -15px rgba(0, 0, 0, 0.6), inset 0 1px 0 rgba(255, 255, 255, 0.06);
      --header-bg: rgba(13, 11, 10, 0.8);
      --dropdown-bg: rgba(13, 11, 10, 0.75);
      --footer-hr: rgba(255, 255, 255, 0.06);

      /* Accent Colors - Dark Theme */
      --color-red: hsl(14, 95%, 56%);
      --color-red-rgb: 232, 66, 10;
      --color-yellow: hsl(38, 92%, 52%);
      --color-yellow-rgb: 212, 146, 10;
      --color-green: hsl(152, 70%, 45%);
      --color-green-rgb: 30, 122, 69;
      --color-purple: hsl(266, 80%, 66%);
      --color-purple-rgb: 123, 63, 196;
      --color-blue: hsl(215, 90%, 60%);
      --color-blue-rgb: 26, 95, 168;
      --color-teal: hsl(170, 75%, 44%);
      --color-teal-rgb: 15, 107, 90;

      --bg-glow-1: rgba(232, 66, 10, 0.07);
      --bg-glow-2: rgba(123, 63, 196, 0.07);
    }

    body {
      background: var(--bg);
      font-family: 'Plus Jakarta Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      color: var(--text);
      min-height: 100vh;
      overflow-x: hidden;
      position: relative;
    }

    /* Prevent text selection and drag on interactive UI elements to fix cursor flash */
    a, button, .card, .btn, .row-btn, .chip, .cc, .theme-toggle-btn, .dd-back-btn, .opt, .ti {
      user-select: none;
      -webkit-user-select: none;
      -webkit-user-drag: none;
    }

    /* BACKGROUND DESIGN ELEMENTS */
    .bg-grid-overlay {
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(var(--bg-grid) 1px, transparent 1px),
        linear-gradient(90deg, var(--bg-grid) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none;
      z-index: 0;
    }

    .bg-glow {
      position: fixed;
      width: 600px;
      height: 600px;
      border-radius: 50%;
      filter: blur(140px);
      pointer-events: none;
      z-index: 0;
      opacity: 0.8;
      will-change: transform;
    }

    .bg-glow-1 {
      top: -10%;
      left: -5%;
      background: var(--bg-glow-1);
      animation: floatGlow 18s infinite alternate ease-in-out;
    }

    .bg-glow-2 {
      bottom: -10%;
      right: -5%;
      background: var(--bg-glow-2);
      animation: floatGlow 22s infinite alternate-reverse ease-in-out;
    }

    @keyframes floatGlow {
      0% {
        transform: translate(0, 0) scale(1);
      }

      100% {
        transform: translate(50px, 30px) scale(1.1);
      }
    }

    /* ── Darren Dias brand nav (ported from the main portfolio) ── */
    .dd-nav {
      position: sticky;
      top: 0;
      width: 100%;
      background: var(--header-bg);
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      border-bottom: 1px solid var(--border);
      z-index: 100;
      transition: background .3s, border-color .3s;
    }

    .dd-nav-inner {
      max-width: 600px;
      margin: 0 auto;
      padding: 14px 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }

    .dd-nav-logo {
      display: inline-flex;
      align-items: center;
      gap: 9px;
      text-decoration: none;
      flex-shrink: 0;
    }

    .dd-nav-logo-mark {
      font-family: 'Syne', sans-serif;
      font-weight: 800;
      font-size: 18px;
      color: var(--color-teal);
      line-height: 1;
      display: inline-flex;
      flex-direction: column;
      align-items: center;
      gap: 1px;
      transition: transform .25s cubic-bezier(.34, 1.56, .64, 1), color .3s;
    }

    .dd-nav-logo:hover .dd-nav-logo-mark {
      transform: translateY(-1px);
    }

    .dd-nlm-row {
      display: inline-flex;
      align-items: center;
    }

    .dd-nlm-flip {
      display: inline-block;
      transform: scaleX(-1);
      margin-right: -0.08em;
    }

    .dd-nlm-smirk-path {
      stroke: var(--text-muted);
      transition: stroke .3s;
    }

    .dd-nav-logo:hover .dd-nlm-smirk-path {
      stroke: var(--color-teal);
    }

    .dd-nav-wordmark {
      font-family: 'Syne', sans-serif;
      font-weight: 800;
      font-size: 15px;
      color: var(--text);
      letter-spacing: -0.01em;
      white-space: nowrap;
      transition: color .3s;
    }

    .dd-nav-right {
      display: flex;
      align-items: center;
      gap: 18px;
    }

    /* premium back button — tinted with this tool's own accent colour on
       hover, so it ties into the same colour identity as the DD logo mark */
    .dd-back-btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      height: 32px;
      padding: 0 14px 0 11px;
      border-radius: 100px;
      border: 1px solid var(--border);
      background: var(--card-bg);
      color: var(--text-muted);
      font-family: 'Plus Jakarta Sans', sans-serif;
      font-size: 13px;
      font-weight: 600;
      text-decoration: none;
      white-space: nowrap;
      box-shadow: var(--card-shadow);
      transition: border-color .25s, background .25s, color .25s, box-shadow .25s, transform .15s;
    }

    .dd-back-btn svg {
      width: 15px;
      height: 15px;
      flex-shrink: 0;
      transition: transform .25s cubic-bezier(.34, 1.56, .64, 1);
    }

    .dd-back-btn:hover {
      border-color: var(--color-teal);
      color: var(--color-teal);
      background: rgba(var(--color-teal-rgb), 0.1);
      box-shadow: 0 4px 16px rgba(var(--color-teal-rgb), 0.22);
    }

    .dd-back-btn:hover svg {
      transform: translateX(-2px);
    }

    .dd-back-btn:active {
      transform: scale(0.94);
    }

    @media (max-width: 360px) {
      .dd-nav-wordmark {
        font-size: 13px;
      }

      .dd-nav-right {
        gap: 12px;
      }

      .dd-back-btn span {
        display: none;
      }

      .dd-back-btn {
        padding: 0 9px;
      }
    }

    /* ── premium custom cursor — real mouse/trackpad only ─────────────
       Touch devices are completely untouched: cursor:none only applies
       inside this same media feature, so nothing changes on mobile.    */
    @media (hover: hover) and (pointer: fine) {

      html.dd-cursor-on,
      html.dd-cursor-on * {
        cursor: none !important;
      }
    }

    .dd-cursor-dot,
    .dd-cursor-ring {
      position: fixed;
      top: 0;
      left: 0;
      pointer-events: none;
      z-index: 9999999;
      border-radius: 50%;
      opacity: 0;
      will-change: transform;
    }

    .dd-cursor-dot.is-visible,
    .dd-cursor-ring.is-visible {
      opacity: 1;
    }

    .dd-cursor-dot.is-leaving,
    .dd-cursor-ring.is-leaving {
      opacity: 0;
    }

    .dd-cursor-dot {
      width: 6px;
      height: 6px;
      background: var(--color-teal);
      transition: opacity .2s;
    }

    .dd-cursor-ring {
      width: 34px;
      height: 34px;
      border: 1.5px solid rgba(var(--color-teal-rgb), 0.55);
      box-shadow: 0 0 16px rgba(var(--color-teal-rgb), 0.22);
      transition: width .3s cubic-bezier(.34, 1.56, .64, 1), height .3s cubic-bezier(.34, 1.56, .64, 1),
        background .3s, border-color .3s, box-shadow .3s, opacity .2s;
      transform: translate(-50%, -50%);
    }

    .dd-cursor-ring.is-active {
      width: 52px;
      height: 52px;
      background: rgba(var(--color-teal-rgb), 0.1);
      border-color: rgba(var(--color-teal-rgb), 0.85);
      box-shadow: 0 0 26px rgba(var(--color-teal-rgb), 0.35);
    }

    .dd-cursor-ring.is-pressed {
      width: 26px;
      height: 26px;
    }



    /* Theme Switcher Button */
    .theme-toggle-btn {
      background: var(--card-bg);
      border: 1px solid var(--border);
      padding: 6px;
      border-radius: 30px;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 6px;
      position: relative;
      width: 58px;
      height: 32px;
      box-shadow: var(--card-shadow);
    }

    .theme-toggle-thumb {
      width: 20px;
      height: 20px;
      border-radius: 50%;
      background: var(--text);
      position: absolute;
      left: 5px;
      transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1), background-color 0.3s;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--bg);
      font-size: 10px;
    }

    [data-theme="dark"] .theme-toggle-thumb {
      transform: translateX(26px);
    }

    .theme-toggle-btn svg {
      width: 13px;
      height: 13px;
      fill: none;
      stroke: currentColor;
      stroke-width: 2.5;
      stroke-linecap: round;
      stroke-linejoin: round;
      opacity: 0.5;
      transition: opacity 0.2s;
    }

    .theme-toggle-btn svg.active {
      opacity: 1;
    }

    .theme-icons {
      display: flex;
      justify-content: space-between;
      width: 100%;
      padding: 0 4px;
      color: var(--text-muted);
      pointer-events: none;
    }

    /* WRAPPER CONTAINER */
    .wrap {
      max-width: 580px;
      margin: 0 auto;
      padding: 44px 20px 80px;
      position: relative;
      z-index: 10;
    }

    /* BRAND LOGO & TAGLINE ON SCREEN */
    .app-brand {
      margin-bottom: 28px;
      animation: fadeInUp 0.4s ease both;
      text-align: center;
    }

    .logo {
      font-family: 'Outfit', sans-serif;
      font-size: 32px;
      font-weight: 900;
      color: var(--color-teal);
      letter-spacing: -0.03em;
      margin-bottom: 24px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      padding-right: 44px;
    }

    .tagline {
      font-size: 16.5px;
      color: var(--text-muted);
      font-weight: 500;
      letter-spacing: -0.01em;
    }

    /* TYPOGRAPHY */
    h2 {
      font-family: 'Outfit', sans-serif;
      font-size: 26px;
      font-weight: 800;
      color: var(--text);
      margin-bottom: 16px;
      letter-spacing: -0.02em;
    }

    .sub {
      font-size: 15.5px;
      color: var(--text-muted);
      line-height: 1.6;
      margin-bottom: 48px;
    }

    /* FORM GROUPS */
    .field {
      margin-bottom: 24px;
      animation: fadeInUp 0.4s ease both;
    }

    .lbl {
      font-family: 'Outfit', sans-serif;
      font-size: 11px;
      font-weight: 800;
      color: var(--text-muted);
      display: block;
      margin-bottom: 8px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
    }

    /* PREMIUM CUSTOM DROPDOWN */
    .dd-dropdown {
      position: relative;
      width: 100%;
      outline: none;
      animation: fadeInUp 0.4s ease 0.15s both;
    }
    /* PREMIUM JAVASCRIPT-DRIVEN DROPDOWN (AVOIDS SAFARI CLIPPING BUGS) */
    .premium-dd-overlay {
      position: fixed;
      inset: 0;
      z-index: 99998;
    }
    .premium-dd-menu {
      position: absolute;
      z-index: 99999;
      background: rgba(var(--dropdown-bg-rgb), 0.75);
      border: 1px solid var(--border);
      border-radius: 16px;
      box-shadow: 0 20px 40px rgba(0,0,0,0.15), 0 0 0 1px rgba(255,255,255,0.05) inset;
      backdrop-filter: blur(24px) saturate(150%);
      -webkit-backdrop-filter: blur(24px) saturate(150%);
      max-height: 280px;
      overflow-y: auto;
      padding: 8px;
      opacity: 0;
      transform: translateY(-10px);
      transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
    }
    .premium-dd-menu.open {
      opacity: 1;
      transform: translateY(0);
    }
    .premium-dd-item {
      padding: 12px 16px;
      border-radius: 10px;
      cursor: pointer;
      font-size: 14.5px;
      color: var(--text);
      transition: background 0.2s, color 0.2s;
    }
    .dd-dropdown-item:hover {
      background: rgba(var(--color-teal-rgb), 0.08);
      color: var(--color-teal);
    }
    .dd-dropdown-item.selected {
      background: rgba(var(--color-teal-rgb), 0.12);
      color: var(--color-teal);
      font-weight: 700;
    }

    /* BUTTONS */
    .btn {
      width: 100%;
      padding: 16px;
      background: var(--color-teal);
      color: #fff;
      border: none;
      border-radius: 100px;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      font-family: inherit;
      box-shadow: 0 4px 14px rgba(var(--color-teal-rgb), 0.25);
      transition: transform 0.25s, box-shadow 0.25s, opacity 0.2s, filter 0.2s;
      margin-top: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .btn:hover:not(:disabled) {
      transform: translateY(-2px);
      box-shadow: 0 8px 20px rgba(var(--color-teal-rgb), 0.35);
      filter: brightness(1.04);
    }

    .btn:disabled {
      opacity: 0.35;
      cursor: default;
      box-shadow: none;
    }

    .btn.ghost {
      background: none;
      border: 1.5px solid var(--border);
      color: var(--text-muted);
      box-shadow: none;
      font-weight: 700;
      margin-top: 24px;
    }

    .btn.ghost:hover {
      background: rgba(var(--color-teal-rgb), 0.03);
      border-color: var(--color-teal);
      color: var(--color-teal);
    }

    /* PREMIUM WARN / ADVICE CARDS */
    .tip {
      background: var(--card-bg);
      border: 1.5px solid var(--border);
      border-radius: 24px;
      padding: 24px;
      margin-bottom: 18px;
      box-shadow: var(--card-shadow);
      animation: fadeInUp 0.4s ease both;
    }

    .tip-title {
      font-family: 'Outfit', sans-serif;
      font-size: 14.5px;
      font-weight: 800;
      color: var(--color-teal);
      margin-bottom: 8px;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }

    .tip-body {
      font-size: 14.5px;
      color: var(--text-muted);
      line-height: 1.6;
      font-weight: 500;
    }

    /* GLOWING STUD TIMELINE MATRIX */
    .timeline {
      padding-left: 36px;
      position: relative;
      margin-top: 28px;
      animation: fadeInUp 0.5s ease both;
    }

    .timeline::before {
      content: '';
      position: absolute;
      left: 14px;
      top: 10px;
      bottom: 10px;
      width: 3px;
      background: var(--border);
      border-radius: 100px;
      box-shadow: 0 0 10px rgba(0, 0, 0, 0.02);
    }

    /* Checkpoint Card Row */
    .premium-dd-trigger {
      display: flex;
      justify-content: space-between;
      align-items: center;
      cursor: pointer;
      width: 100%;
      padding: 14px 18px;
      border: 1.5px solid var(--border);
      border-radius: 16px;
      font-size: 15px;
      color: var(--text);
      background: var(--card-bg);
      box-shadow: var(--card-shadow);
      transition: border-color 0.3s, box-shadow 0.3s;
    }
    .premium-dd-trigger span.placeholder {
      color: var(--text-muted);
    }
    .premium-dd-trigger.active {
      transform: translateY(-2px);
      box-shadow: var(--card-shadow-hover);
    }

    .ti {
      position: relative;
      margin-bottom: 24px;
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 22px;
      padding: 22px 24px;
      box-shadow: var(--card-shadow);
      transition: transform 0.25s, box-shadow 0.25s;
    }

    .ti:hover {
      transform: translateY(-2px);
      box-shadow: var(--card-shadow-hover);
    }

    /* Timeline Stud Nodes */
    .ti::before {
      content: '';
      position: absolute;
      left: -28px;
      top: 25px;
      width: 14px;
      height: 14px;
      border-radius: 50%;
      background: var(--color-teal);
      border: 3.5px solid var(--bg);
      box-shadow: 0 0 8px rgba(var(--color-teal-rgb), 0.35);
      z-index: 2;
      transition: all 0.3s;
    }

    .ti.urg::before {
      background: var(--color-yellow);
      box-shadow: 0 0 8px rgba(var(--color-yellow-rgb), 0.35);
    }

    .ti.done::before {
      background: var(--color-green);
      box-shadow: 0 0 8px rgba(var(--color-green-rgb), 0.35);
    }

    /* Checkpoint text fields */
    .month-lbl {
      font-family: 'Outfit', sans-serif;
      font-size: 11px;
      font-weight: 800;
      color: var(--color-teal);
      text-transform: uppercase;
      letter-spacing: 0.12em;
      margin-bottom: 6px;
      display: flex;
      align-items: center;
    }

    .ti.urg .month-lbl {
      color: var(--color-yellow);
    }

    .ti.done .month-lbl {
      color: var(--color-green);
    }

    .ti-title {
      font-family: 'Outfit', sans-serif;
      font-size: 17px;
      font-weight: 800;
      color: var(--text);
      margin-bottom: 6px;
      letter-spacing: -0.01em;
    }

    .ti-desc {
      font-size: 14px;
      color: var(--text-muted);
      line-height: 1.6;
    }

    /* URGENT TAGS */
    .urg-pill {
      display: inline-flex;
      font-size: 10px;
      font-weight: 800;
      padding: 2px 8px;
      border-radius: 100px;
      background: rgba(var(--color-yellow-rgb), 0.08);
      border: 1px solid rgba(var(--color-yellow-rgb), 0.15);
      color: var(--color-yellow);
      margin-left: 8px;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      line-height: 1;
    }

    /* KEYFRAMES FOR TRANSITIONS */
    @keyframes fadeInUp {
      from {
        opacity: 0;
        transform: translateY(12px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes fadeInDown {
      from {
        opacity: 0;
        transform: translateY(-8px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    /* RESPONSIVE SCALING TWEAKS */
    @media(max-width: 440px) {
      .timeline {
        padding-left: 28px;
      }

      .timeline::before {
        left: 10px;
      }

      .ti {
        padding: 16px 18px;
        border-radius: 18px;
        margin-bottom: 18px;
      }

      .ti::before {
        left: -24px;
        top: 20px;
        width: 12px;
        height: 12px;
        border: 3px solid var(--bg);
      }

      .month-lbl {
        margin-bottom: 4px;
        font-size: 10.5px;
      }

      .ti-title {
        font-size: 15.5px;
        margin-bottom: 4px;
      }

      .ti-desc {
        font-size: 13px;
      }
    }
    /* PREMIUM AI LOADER SYSTEM */
    .ai-loader-container {
      position: relative;
      width: 120px;
      height: 120px;
      margin: 40px auto 20px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .ai-pulse-orb {
      width: 90px;
      height: 90px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(var(--color-teal-rgb), 0.15) 0%, rgba(var(--color-green-rgb), 0.05) 100%);
      border: 2px solid rgba(var(--color-teal-rgb), 0.25);
      box-shadow: 0 0 30px rgba(var(--color-teal-rgb), 0.2), inset 0 0 15px rgba(var(--color-teal-rgb), 0.1);
      display: flex;
      align-items: center;
      justify-content: center;
      animation: aiPulse 2s infinite alternate ease-in-out;
    }

    .ai-inner-core {
      font-size: 32px;
      animation: aiRotate 4s infinite linear;
    }

    .ai-scan-line {
      position: absolute;
      width: 110px;
      height: 2px;
      background: linear-gradient(90deg, transparent 0%, var(--color-teal) 50%, transparent 100%);
      box-shadow: 0 0 12px var(--color-teal);
      animation: aiScan 2s infinite ease-in-out;
      opacity: 0.8;
    }

    @keyframes aiPulse {
      0% {
        transform: scale(0.95);
        border-color: rgba(var(--color-teal-rgb), 0.2);
        box-shadow: 0 0 20px rgba(var(--color-teal-rgb), 0.15);
      }
      100% {
        transform: scale(1.05);
        border-color: rgba(var(--color-green-rgb), 0.5);
        box-shadow: 0 0 40px rgba(var(--color-green-rgb), 0.35);
      }
    }

    @keyframes aiRotate {
      0% { transform: rotate(0deg) scale(1); }
      50% { transform: rotate(180deg) scale(1.1); }
      100% { transform: rotate(360deg) scale(1); }
    }

    @keyframes aiScan {
      0% { top: 10%; }
      50% { top: 90%; }
      100% { top: 10%; }
    }
  </style>
</head>

  </div>

  <!-- TIMELINE CALCULATOR ENGINE -->
  <script>
    // PREMIUM DROPDOWN ENGINE
    function openPremiumDropdown(e, options, selectedValue, accentVar, onSelectCallback) {
      document.querySelectorAll('.premium-dd-menu, .premium-dd-overlay').forEach(el => el.remove());
      const trigger = e.currentTarget;
      const rect = trigger.getBoundingClientRect();
      const overlay = document.createElement('div');
      overlay.className = 'premium-dd-overlay';
      overlay.onclick = () => {
        document.querySelectorAll('.premium-dd-menu, .premium-dd-overlay').forEach(el => el.remove());
        trigger.classList.remove('active');
      };
      document.body.appendChild(overlay);
      
      const menu = document.createElement('div');
      menu.className = 'premium-dd-menu';
      menu.style.setProperty('--accent-rgb', accentVar);
      
      options.forEach(opt => {
        const item = document.createElement('div');
        item.className = 'premium-dd-item' + (opt.value === selectedValue ? ' selected' : '');
        item.innerHTML = opt.label;
        item.onclick = () => {
          onSelectCallback(opt.value);
          overlay.remove();
          menu.remove();
          trigger.classList.remove('active');
        };
        menu.appendChild(item);
      });
      document.body.appendChild(menu);
      
      const menuHeight = menu.offsetHeight;
      const spaceBelow = window.innerHeight - rect.bottom;
      const spaceAbove = rect.top;
      
      if (spaceBelow < menuHeight + 16 && spaceAbove > spaceBelow) {
        menu.style.top = (rect.top + window.scrollY - menuHeight - 8) + 'px';
        menu.style.transform = 'translateY(10px)';
      } else {
        menu.style.top = (rect.bottom + window.scrollY + 8) + 'px';
      }
      
      menu.style.left = (rect.left + window.scrollX) + 'px';
      menu.style.width = rect.width + 'px';
      trigger.classList.add('active');
      requestAnimationFrame(() => menu.classList.add('open'));
    }

    // Force scroll to top on page load and manual restoration
    if ('scrollRestoration' in history) {
      history.scrollRestoration = 'manual';
    }
    window.scrollTo(0, 0);

    const COUNTRY_NOTES = {
      "India": "Indian students must book a biometrics appointment at a VFS Global centre. Processing typically takes 3–8 weeks. The IHS surcharge is required and currently £776/year. Ensure your funds have been in your account for 28 consecutive days.",
      "Nigeria": "Nigerian applicants often face longer processing times (6–12 weeks). Book your biometrics at the UK Visa Application Centre early. Demonstrate strong ties to Nigeria (family, property, job) to reassure visa officers.",
      "Pakistan": "Pakistani nationals should allow 8–12 weeks for processing. VAC appointments can be limited — book the earliest available slot. Police clearance certificates may be requested.",
      "Bangladesh": "Bangladeshi students must use the UKVI approved VAC in Dhaka. Processing can take 6–10 weeks. Ensure all financial documents are translated into English.",
      "Sri Lanka": "Sri Lankan applicants typically see 3–6 week processing times. Use the VFS Global centre in Colombo. Strong English scores (IELTS/PTE) are essential.",
      "Nepal": "Nepalese students should apply at the British Embassy in Kathmandu. Allow 4–8 weeks. Bank statements showing stable funds over 28 days are critical.",
      "Ghana": "Ghanaian applicants may face scrutiny on financial documents — ensure everything is officially stamped and translated. Allow 8–12 weeks.",
      "Kenya": "Kenyan students generally see 4–8 week processing. Use the UKVI application centre in Nairobi. Start the process early in case of delays.",
      "China": "Chinese applicants often have fast processing (2–4 weeks) but must use the official UKVI centres. Have HSK/English scores ready as a prerequisite.",
      "Malaysia": "Malaysian students are generally straightforward — 3–5 week processing. Ensure your IELTS/PTE meets the programme requirement.",
      "Philippines": "Filipino applicants should allow 4–8 weeks and book at the VFS Global centre. Strong financial documentation is key.",
      "USA": "US students do not need a Tier 4 visa for courses under 6 months, but a Student Visa is required for longer courses. Processing is typically 3–5 weeks.",
      "Canada": "Canadian students follow a similar process to the US — straightforward with 3–5 week processing.",
      "Australia": "Australian applicants generally see fast processing (2–4 weeks). You'll still need to apply via UKVI online.",
      "EU / EEA Country": "EU/EEA nationals no longer have automatic right to study in the UK post-Brexit. You must apply for a Student Visa. Processing is typically 3–5 weeks.",
    };

    const INTAKE_MONTHS = ["January", "February", "March", "April", "May", "June", "July", "August", "September", "October", "November", "December"];
    const LEVELS = ["Undergraduate (UG)", "Postgraduate Taught (PGT)", "Postgraduate Research (PGR)", "Foundation Year", "Pre-sessional English"];
    const COUNTRIES = Object.keys(COUNTRY_NOTES).concat(["Other"]);

    const COUNTRY_FLAGS = {
      "India": "🇮🇳",
      "Nigeria": "🇳🇬",
      "Pakistan": "🇵🇰",
      "Bangladesh": "🇧🇩",
      "Sri Lanka": "🇱🇰",
      "Nepal": "🇳🇵",
      "Ghana": "🇬🇭",
      "Kenya": "🇰🇪",
      "China": "🇨🇳",
      "Malaysia": "🇲🇾",
      "Philippines": "🇵🇭",
      "USA": "🇺🇸",
      "Canada": "🇨🇦",
      "Australia": "🇦🇺",
      "EU / EEA Country": "🇪🇺",
      "Other": "🌍"
    };

    const MONTH_NAMES = ["January", "February", "March", "April", "May", "June", "July", "August", "September", "October", "November", "December"];

    function addMonths(baseMonth, baseYear, delta) {
      let m = baseMonth + delta;
      let y = baseYear;
      while (m < 0) { m += 12; y--; }
      while (m > 11) { m -= 12; y++; }
      return MONTH_NAMES[m] + " " + y;
    }

    function buildTimeline(country, intakeMonth, intakeYear, level) {
      const bm = MONTH_NAMES.indexOf(intakeMonth);
      const by = intakeYear;
      const note = COUNTRY_NOTES[country] || "Allow 4–8 weeks for visa processing. Book your biometrics appointment as soon as your application is submitted.";

      const isLongCourse = level !== "Pre-sessional English";

      const items = [
        { delta: -8, urgent: false, title: "Research universities & shortlist", desc: "Start researching programmes, entry requirements, and scholarship deadlines. UCAS opens in September for undergraduate entry." },
        { delta: -7, urgent: false, title: "Sit English language test (IELTS/PTE/OET)", desc: "Book and complete your IELTS or PTE test now. Most UK universities require IELTS 6.0–6.5 for UG and 6.5–7.0 for PG. Results take 2–13 days." },
        { delta: -6, urgent: false, title: "Submit university applications", desc: "Apply through UCAS (UG) or directly to universities (PG). Attach your personal statement, transcripts, and English test scores." },
        { delta: -5, urgent: false, title: "Receive & accept your offer", desc: "Accept your unconditional or conditional offer. If conditional, focus on meeting the academic requirements before the deadline." },
        { delta: -4, urgent: true, title: "Receive your CAS (Confirmation of Acceptance for Studies)", desc: "Your university issues a CAS number once you've accepted and met all conditions. You CANNOT apply for your visa without this. Chase it proactively." },
        { delta: -3, urgent: true, title: "Apply for your UK Student Visa online", desc: "Apply on the UKVI website using your CAS number. Pay the visa fee (£490) and the IHS surcharge. Have £1,334/month in savings (£1,023 outside London) for 28 consecutive days." },
        { delta: -3, urgent: false, title: "Gather your documents", desc: "Passport, CAS letter, bank statements (28 days), IELTS/PTE certificate, academic transcripts, financial sponsor letter (if applicable), TB test results (if required for your country)." },
        { delta: -2, urgent: true, title: "Attend biometrics appointment", desc: `Book and attend your biometrics at the nearest VAC/VFS Global centre. ${note.split('.')[0]}.` },
        { delta: -1, urgent: false, title: "Book flights & accommodation", desc: "Once your visa is granted, book your flight to arrive before term starts. Pre-book student halls or check university accommodation portals — rooms fill fast." },
        { delta: -1, urgent: false, title: "Prepare finances & SIM card", desc: "Open a UK bank account online before arriving (Monzo, Starling or Wise work without a UK address). Buy a UK SIM card online to activate on arrival." },
        { delta: 0, urgent: false, title: "Arrive in the UK & enrol 🎉", desc: "Arrive before your CAS start date. Attend university enrolment/induction week. Register with the university and pick up your BRP (Biometric Residence Permit) from the post office." },
        { delta: 1, urgent: false, title: "Register with a GP", desc: "Register with a local NHS GP within your first month. As an international student who paid the IHS surcharge, you have full NHS access — use it." },
      ];

      return items.map(item => ({
        ...item,
        monthLabel: addMonths(bm, by, item.delta),
      }));
    }

    let country = "", intake = "", intakeYear = 2025, level = "", loading = false;

    function update() { render(); }

    function render() {
      const canGo = country && intake && level;
      const el = document.getElementById('app');

      if (loading) {
        el.innerHTML = `
          <div style="text-align:center; padding: 48px 20px; animation: fadeInUp 0.5s ease both;">
            <div class="ai-loader-container">
              <div class="ai-pulse-orb">
                <div class="ai-inner-core">
                  <svg xmlns="http://www.w3.org/2000/svg" width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="color: var(--color-teal);"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect><line x1="16" y1="2" x2="16" y2="6"></line><line x1="8" y1="2" x2="8" y2="6"></line><line x1="3" y1="10" x2="21" y2="10"></line></svg>
                </div>
              </div>
              <div class="ai-scan-line"></div>
            </div>
            <h3 style="font-family:'Outfit', sans-serif; font-size:22px; font-weight:900; color:var(--text); margin-top:28px;">VisaPath AI Compliance Engine</h3>
            <p id="ai-loading-lbl" style="font-size:14.5px; color:var(--color-teal); font-weight:700; margin-top:12px; min-height: 24px; letter-spacing: 0.02em;">Parsing application criteria...</p>
            <p style="font-size:13px; color:var(--text-muted); margin-top:8px;">Running matching models over UKVI databases...</p>
          </div>
        `;
        return;
      }

      if (!el._showResults) {
        el.innerHTML = `
          <div style="animation: fadeInUp 0.4s ease both; text-align: center; margin-bottom: 24px;">
            <h2>Your journey starts here</h2>
            <p class="sub" style="margin-left: auto; margin-right: auto; max-width: 440px;">Fill in the details below to generate a personalised timeline for your UK Student Visa application.</p>
          </div>
          
          <div style="animation: fadeInUp 0.4s ease both;">
            <div class="field">
              <label class="lbl">Your country of nationality</label>
              <div class="premium-dd-trigger" onclick="openPremiumDropdown(event, COUNTRIES.map(c => ({label: (COUNTRY_FLAGS[c] ? '<span style=\\'margin-right: 8px;\\'>' + COUNTRY_FLAGS[c] + '</span>' : '') + c, value: c})), country, 'var(--color-teal-rgb)', (val) => { country = val; update(); })">
                <span class="${!country ? 'placeholder' : ''}">${country ? (COUNTRY_FLAGS[country] ? '<span style="margin-right: 8px;">' + COUNTRY_FLAGS[country] + '</span>' : '') + country : 'Select your country...'}</span>
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"></polyline></svg>
              </div>
            </div>
            
            <div class="field">
              <label class="lbl">Course intake</label>
              <div class="premium-dd-trigger" onclick="openPremiumDropdown(event, [2025, 2026].flatMap(y => INTAKE_MONTHS.map(m => ({label: m + ' ' + y, value: m + '|' + y}))), intake ? (intake + '|' + intakeYear) : '', 'var(--color-teal-rgb)', (val) => { const parts = val.split('|'); intake = parts[0]; intakeYear = parseInt(parts[1]); update(); })">
                <span class="${!intake ? 'placeholder' : ''}">${intake ? (intake + ' ' + intakeYear) : 'Select intake month...'}</span>
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"></polyline></svg>
              </div>
            </div>
            
            <div class="field">
              <label class="lbl">Level of study</label>
              <div class="premium-dd-trigger" onclick="openPremiumDropdown(event, LEVELS.map(l => ({label: l, value: l})), level, 'var(--color-teal-rgb)', (val) => { level = val; update(); })">
                <span class="${!level ? 'placeholder' : ''}">${level || 'Select level...'}</span>
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"></polyline></svg>
              </div>
            </div>
            
            <button class="btn" onclick="showTimeline()" ${canGo ? '' : 'disabled'}>Generate my timeline →</button>
            ${!canGo ? `<p style="font-size:13.5px;color:var(--text-muted);margin-top:14px;text-align:center;font-weight:600;">Complete all 3 fields above</p>` : ''}
          </div>`;
      }
    }

    function triggerAILoader() {
      loading = true;
      render();

      const loadingMessages = [
        "Analyzing nationality criteria for " + country + "...",
        "Validating " + level + " intake schedules...",
        "Querying UKVI visa guidance libraries...",
        "Calculating CAS release & finance timelines...",
        "Synthesizing customized compliance roadmap..."
      ];

      let msgIndex = 0;
      const interval = setInterval(() => {
        const lbl = document.getElementById('ai-loading-lbl');
        if (lbl && msgIndex < loadingMessages.length) {
          lbl.textContent = loadingMessages[msgIndex++];
        }
      }, 500);

      setTimeout(() => {
        clearInterval(interval);
        loading = false;
        renderTimeline();
      }, 3000);
    }

    function showTimeline() {
      triggerAILoader();
    }

    function renderTimeline() {
      window.scrollTo(0, 0);
      const timeline = buildTimeline(country, intake, intakeYear, level);
      const note = COUNTRY_NOTES[country] || "Allow 4–8 weeks for processing and book your biometrics appointment promptly.";
      const el = document.getElementById('app');
      el._showResults = true;

      el.innerHTML = `
        <div style="margin-bottom:28px; animation: fadeInUp 0.4s ease both;">
          <div style="font-size:11px;color:var(--color-teal);font-weight:800;text-transform:uppercase;letter-spacing:.08em;margin-bottom:8px">Your Personalised Timeline</div>
          <h2 style="font-size:28px">${country} → UK · ${intake} ${intakeYear}</h2>
          <p style="font-size:14.5px;color:var(--text-muted);font-weight:600;margin-top:6px">${level}</p>
        </div>
        
        <!-- Custom Warning Advice testinfo -->
        <div class="tip">
          <div class="tip-title">💡 Key info for ${country} students</div>
          <div class="tip-body">${note}</div>
        </div>
        
        <div class="tip" style="border-color: rgba(var(--color-yellow-rgb), 0.25); background: rgba(var(--color-yellow-rgb), 0.04);">
          <div class="tip-title" style="color:var(--color-yellow)">⚡ Most important rule</div>
          <div class="tip-body" style="color:var(--text)">You need <strong>£1,334/month</strong> (or £1,023/month outside London) in your bank account for <strong>28 consecutive days</strong> before applying. Start building this fund early.</div>
        </div>
        
        <div style="margin:36px 0 18px; animation: fadeInUp 0.4s ease both;">
          <div style="font-family:'Outfit', sans-serif; font-size:11px;font-weight:800;color:var(--text-muted);text-transform:uppercase;letter-spacing:0.12em">Month-by-Month Checklist</div>
        </div>
        
        <div class="timeline">
          ${timeline.map((t, idx) => `<div class="ti${t.urgent ? ' urg' : ''}" style="animation-delay: ${idx * 0.04}s">
            <div class="month-lbl">
              ${t.monthLabel}
              ${t.urgent ? '<span class="urg-pill">⚡ urgent</span>' : ''}
            </div>
            <div class="ti-title">${t.title}</div>
            <div class="ti-desc">${t.desc}</div>
          </div>`).join('')}
        </div>
        
        <button class="btn ghost" onclick="window.scrollTo(0, 0); document.getElementById('app')._showResults=false;render()">← Generate another timeline</button>`;
    }

    // INITIAL LOAD
    render();

    // DYNAMIC LIGHT / DARK THEME SYSTEM
    const themeToggleBtn = document.getElementById('themeToggleBtn');
    const iconSun = document.getElementById('icon-sun');
    const iconMoon = document.getElementById('icon-moon');
    const htmlElement = document.documentElement;

    // Load theme from localStorage or system preference
    const savedTheme = localStorage.getItem('theme');
    const systemPrefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
    const initialTheme = savedTheme || (systemPrefersDark ? 'dark' : 'light');

    setTheme(initialTheme);

    themeToggleBtn.addEventListener('click', () => {
      const currentTheme = htmlElement.getAttribute('data-theme');
      const newTheme = currentTheme === 'dark' ? 'light' : 'dark';
      setTheme(newTheme);
    });

    function setTheme(theme) {
      htmlElement.setAttribute('data-theme', theme);
      localStorage.setItem('theme', theme);

      if (theme === 'dark') {
        iconMoon.classList.add('active');
        iconSun.classList.remove('active');
      } else {
        iconSun.classList.add('active');
        iconMoon.classList.remove('active');
      }
    }

    /* ── premium custom cursor ──────────────────────────────────────
       Dot tracks the pointer exactly; the ring trails behind with a
       little easing for a smooth, fluid feel. Scales up over anything
       clickable, scales down on press, and never touches touch devices
       at all — gated behind the same media feature the CSS uses.      */
    (function initPremiumCursor() {
      if (!window.matchMedia('(hover: hover) and (pointer: fine)').matches) return;

      document.documentElement.classList.add('dd-cursor-on');

      var dot = document.createElement('div');
      dot.className = 'dd-cursor-dot';
      var ring = document.createElement('div');
      ring.className = 'dd-cursor-ring';
      document.body.appendChild(dot);
      document.body.appendChild(ring);

      var mx = 0, my = 0, rx = 0, ry = 0, hasMoved = false;

      function placeDot() {
        dot.style.transform = 'translate(' + mx + 'px, ' + my + 'px) translate(-50%, -50%)';
      }

      window.addEventListener('mousemove', function (e) {
        mx = e.clientX;
        my = e.clientY;
        if (!hasMoved) {
          hasMoved = true;
          rx = mx;
          ry = my;
          dot.classList.add('is-visible');
          ring.classList.add('is-visible');
        }
        placeDot();
      });

      (function tick() {
        rx += (mx - rx) * 0.18;
        ry += (my - ry) * 0.18;
        ring.style.transform = 'translate(' + rx + 'px, ' + ry + 'px) translate(-50%, -50%)';
        requestAnimationFrame(tick);
      })();

      var interactiveSel = 'a, button, input, select, textarea, label, summary, [role="button"], [onclick]';

      document.addEventListener('mouseover', function (e) {
        if (e.target.closest(interactiveSel)) ring.classList.add('is-active');
      });
      document.addEventListener('mouseout', function (e) {
        if (e.target.closest(interactiveSel)) ring.classList.remove('is-active');
      });
      document.addEventListener('mousedown', function () { ring.classList.add('is-pressed'); });
      document.addEventListener('mouseup', function () { ring.classList.remove('is-pressed'); });

      document.addEventListener('mouseleave', function () {
        dot.classList.add('is-leaving');
        ring.classList.add('is-leaving');
      });
      document.addEventListener('mouseenter', function () {
        dot.classList.remove('is-leaving');
        ring.classList.remove('is-leaving');
      });
    })();
  </script>
</body>

</html>
